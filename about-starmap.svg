  <text x="400" y="238" text-anchor="middle" font-size="10" fill="#ff8040" letter-spacing="3" opacity="0.7">·  ORBITAL TRAITS  ·</text>

  <text x="155" y="258" font-size="11" fill="#ffaa60" letter-spacing="0.5">  ⊹  Hackathons &amp; building under pressure</text>
  <text x="155" y="276" font-size="11" fill="#ffaa60" letter-spacing="0.5">  ⊹  Creative tech projects</text>
  <text x="155" y="294" font-size="11" fill="#ffaa60" letter-spacing="0.5">  ⊹  Video editing &amp; motion design</text>

