name: Generate Pac-Man Commits

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily
  workflow_dispatch:

# 👾 SQUASHING THE NODE.JS WARNING 👾
# This forces the runner to use Node 24, fixing the deprecation notice
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Generate Pac-Man contribution graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman-contribution-graph.svg?color_snake=#FFD700&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            
      - name: Push to output branch
        # Bumped to v4 for updated Node support
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
