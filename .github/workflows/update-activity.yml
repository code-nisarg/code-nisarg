name: Update GitHub Activity Maze

on:
  schedule:
    - cron: "0 */12 * * *" # Auto-saves every 12 hours
  workflow_dispatch: # Allows you to trigger it manually

# 👾 FORCE NODE 24 TO FIX DEPRECATION WARNINGS 👾
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Update this repo's README with recent activity
    steps:
      - uses: actions/checkout@v4 # Bumped to v4 for Node 20+ support
      - uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "👾 quest log updated: recent github activity"
          MAX_LINES: 5
